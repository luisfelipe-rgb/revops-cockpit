<!DOCTYPE html>
<html lang="pt-BR">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --bg: #000000;
    --surface: #0c0c0c;
    --surface-2: #141414;
    --border: #1f1f1f;
    --border-strong: #2a2a2a;
    --text: #f5f5f5;
    --text-muted: #888888;
    --text-dim: #555555;
    --positive: #4ade80;
    --warning: #fbbf24;
    --negative: #f87171;
    --accent: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10; background: var(--bg);
    flex-wrap: wrap; gap: 12px;
  }
  .brand { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .brand span { color: var(--text-muted); font-weight: 400; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .meta-chip {
    font-size: 11px; color: var(--text-muted);
    background: var(--surface-2); padding: 6px 12px;
    border-radius: 6px; border: 1px solid var(--border);
  }
  .meta-chip strong { color: var(--text); font-weight: 600; }
  .mock-chip {
    font-size: 11px; color: var(--warning);
    background: rgba(251, 191, 36, .08); padding: 6px 12px;
    border-radius: 6px; border: 1px solid rgba(251, 191, 36, .3);
  }
  /* DATE SLICER ROW */
  .slicer {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 32px; border-bottom: 1px solid var(--border);
    background: var(--bg); flex-wrap: wrap;
    position: sticky; top: 65px; z-index: 9;
  }
  .slicer-group { display: flex; align-items: center; gap: 8px; }
  .slicer label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
  }
  .slicer input[type="date"] {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 12px;
    padding: 6px 10px; border-radius: 6px; outline: none;
    color-scheme: dark;
  }
  .slicer input[type="date"]:focus { border-color: var(--accent); }
  .slicer select {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 12px;
    padding: 6px 10px; border-radius: 6px; outline: none;
    cursor: pointer; color-scheme: dark; max-width: 220px;
  }
  .slicer select:focus { border-color: var(--accent); }
  .slicer-divider { width: 1px; height: 24px; background: var(--border); }
  .slicer-arrow { color: var(--text-dim); font-size: 12px; }
  .slicer-presets { display: flex; gap: 4px; margin-left: 6px; }
  .preset-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); padding: 6px 12px; font-size: 11px;
    border-radius: 6px; cursor: pointer; font-family: inherit;
    transition: all .15s;
  }
  .preset-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .preset-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .apply-btn {
    background: var(--accent); border: none; color: var(--bg);
    padding: 7px 16px; font-size: 12px; font-weight: 600;
    border-radius: 6px; cursor: pointer; font-family: inherit;
    margin-left: auto;
  }
  .apply-btn:disabled { opacity: .4; cursor: not-allowed; }
  .apply-btn:hover:not(:disabled) { opacity: .9; }
  .tabs {
    display: flex; gap: 2px; padding: 0 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg); overflow-x: auto;
    position: sticky; top: 126px; z-index: 9;
  }
  .tab-btn {
    background: transparent; border: none; color: var(--text-muted);
    padding: 14px 18px; font-size: 13px; font-weight: 500;
    cursor: pointer; border-bottom: 2px solid transparent;
    font-family: inherit; white-space: nowrap;
    transition: color .15s, border-color .15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }
  main {
    padding: 40px 32px 60px;
    max-width: 1240px; margin: 0 auto;

  .tab-header {
    margin-bottom: 32px; display: flex;
    align-items: baseline; justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }
  .tab-header h1 {
    font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
  }
  .tab-header .subtitle {
    color: var(--text-muted); font-size: 13px; margin-top: 6px;

  .hero-grid {

  .hero {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px 26px;
    position: relative;

  .hero:hover { border-color: var(--border-strong); }
  .hero .head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .hero .label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .07em;
    font-weight: 600;
  }
  .hero .farol-dot {
    width: 12px; height: 12px; border-radius: 50%;
    box-shadow: 0 0 12px currentColor;
  }
  .hero .farol-dot.verde { background: var(--positive); color: var(--positive); }
  .hero .farol-dot.amarelo { background: var(--warning); color: var(--warning); }
  .hero .farol-dot.vermelho { background: var(--negative); color: var(--negative); }
  .hero .farol-dot.cinza { background: var(--text-dim); color: transparent; box-shadow: none; }
  .hero .value {

  .vs-bp-head .pct { font-weight: 600; font-variant-numeric: tabular-nums; }
  .vs-bp-head .pct.verde { color: var(--positive); }
  .vs-bp-head .pct.amarelo { color: var(--warning); }
  .vs-bp-head .pct.vermelho { color: var(--negative); }
  .vs-bp-track {
    height: 4px; background: var(--surface-2);
    border-radius: 2px; overflow: hidden; position: relative;
  }
  .vs-bp-fill {
    height: 100%; border-radius: 2px;
    transition: width .4s ease;
  }
  .vs-bp-fill.verde { background: var(--positive); }
  .vs-bp-fill.amarelo { background: var(--warning); }
  .vs-bp-fill.vermelho { background: var(--negative); }
  .vs-bp-fill.cinza { background: var(--text-dim); }
  .vs-bp-mark {
    position: absolute; top: -2px; bottom: -2px;
    width: 1px; background: var(--text-muted); opacity: .5;
  }
  .delta-m1 {
    margin-top: 12px; font-size: 11px; color: var(--text-muted);
  }
  .delta-m1 .up { color: var(--positive); }
  .delta-m1 .down { color: var(--negative); }

    width: 100%; border-collapse: collapse;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;

  .ch-table th, .ch-table td {
    padding: 11px 16px; text-align: right;
    font-size: 12px; border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums; white-space: nowrap;

    font-size: 10px; text-transform: uppercase; letter-spacing: .05em;
    font-weight: 600;
  }
  .ch-table tbody tr:hover { background: rgba(255,255,255,.02); }
  .ch-table tbody tr:last-child td { border-bottom: none; }
  .ch-table tfoot td {
    background: var(--surface-2); font-weight: 700;
    color: var(--text); border-top: 1px solid var(--border-strong);

  .ch-name { color: var(--text); font-weight: 600; }
  .ch-roas-pos { color: var(--positive); font-weight: 600; }
  .ch-roas-neg { color: var(--negative); font-weight: 600; }

    margin-top: 8px;
  }
  .support-title {
    font-size: 12px; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 14px;

  .hbar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
  }
  .hbar-head {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 10px;
  }
  .hbar-label { font-size: 13px; color: var(--text); font-weight: 500; }
  .hbar-value {
    font-size: 13px; font-weight: 600; color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .hbar-value .secondary {
    color: var(--text-muted); margin-left: 8px; font-weight: 400;
  }
  .hbar-track {
    height: 8px; background: var(--surface-2);
    border-radius: 4px; overflow: hidden;
  }
  .hbar-fill {
    height: 100%; border-radius: 4px;
    background: var(--accent);
    transition: width .3s ease;
  }
  /* Footer */
  .footer {
    margin-top: 48px; padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--text-dim); font-size: 11px;
    text-align: center;
  }
  .farol-key {
    display: inline-flex; align-items: center; gap: 5px;
    margin-right: 14px; font-size: 11px; color: var(--text-muted);
  }
  .farol-key .dot { width: 7px; height: 7px; border-radius: 50%; }
  .farol-key .dot.verde { background: var(--positive); }
  .farol-key .dot.amarelo { background: var(--warning); }
  .farol-key .dot.vermelho { background: var(--negative); }
  @media (max-width: 900px) {
    .hero-grid { grid-template-columns: 1fr; }
    main { padding: 28px 18px 48px; }
    .topbar { padding: 12px 18px; }
    .tabs { padding: 0 18px; }
    .hero .value { font-size: 32px; }
  }
</style>

function farolFromPct(p) {
  if (p === null || p === undefined || isNaN(p)) return 'cinza';
  if (p >= BAND_VERDE) return 'verde';
  if (p >= BAND_AMARELO) return 'amarelo';

  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e6) return sign + 'R$ ' + (abs / 1e6).toFixed(2).replace('.', ',') + 'M';
  if (abs >= 1e3) return sign + 'R$ ' + (abs / 1e3).toFixed(1).replace('.', ',') + 'k';
  return sign + 'R$ ' + abs.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, '.');
};

const fmtVal = (n, fmt) => {
  if (n === null || n === undefined) return '—';
  if (fmt === 'brl') return fmtBRL(n);
  if (fmt === 'pct') return fmtPct(n);
  if (fmt === 'multiple') return fmtMultiple(n);
  if (fmt === 'qty') return fmtQty(n);
  return String(n);
};

function Hero({ metric }) {
  const farol = farolFromPct(metric.pctBp);
  const fillPct = metric.pctBp == null ? 0 : Math.min(metric.pctBp * 100, 150); // cap visual em 150%
  const deltaM1 = (metric.m1 != null && metric.act != null && metric.m1 !== 0)
    ? (metric.act - metric.m1) / metric.m1 : null;
  return (
    <div className="hero">
      <div className="head">
        <div className="label">{metric.label}</div>
        <span className={`farol-dot ${farol}`} title={`${fmtPct(metric.pctBp)} do BP`} />
      </div>
      <div className="value">{fmtVal(metric.act, metric.fmt)}</div>
      {metric.pctBp != null && (
        <div className="vs-bp">
          <div className="vs-bp-head">
            <span>vs Business Plan</span>
            <span className={`pct ${farol}`}>{fmtPct(metric.pctBp, 0)}</span>
          </div>
          <div className="vs-bp-track">
            {/* mark de 100% — em 150% de escala, 100% = 66.67% */}
            <div className="vs-bp-mark" style={{ left: `${(100 / 150) * 100}%` }} />
            <div className={`vs-bp-fill ${farol}`} style={{ width: `${(fillPct / 150) * 100}%` }} />
          </div>
        </div>
      )}
      {deltaM1 != null && (
        <div className="delta-m1">
          <span className={deltaM1 >= 0 ? 'up' : 'down'}>
            {deltaM1 >= 0 ? '↑' : '↓'} {fmtPct(Math.abs(deltaM1), 0)}
          </span>
          {' '}vs mês anterior
        </div>
      )}
    </div>
  );
}

function HBarList({ items, valueFmt = 'brl' }) {
  const max = Math.max(...items.map(i => i.value));
  return (
    <div className="hbar-list">
      {items.map((it, i) => (
        <div key={i} className="hbar">
          <div className="hbar-head">
            <span className="hbar-label">{it.label}</span>
            <span className="hbar-value">
              {valueFmt === 'pct' ? fmtPct(it.value, 1) : fmtBRL(it.value)}
              {it.amount != null && <span className="secondary">{fmtBRL(it.amount)}</span>}
            </span>
          </div>
          <div className="hbar-track">
            <div className="hbar-fill" style={{ width: `${(it.value / max) * 100}%` }} />
          </div>
        </div>
      ))}
    </div>
  );
}

// ============================================================
// CHANNEL TABLE — análise de aquisição por canal
//   ROAS = FTD R$ / Investimento · CAC = Investimento / FTD qtd · Ticket = FTD R$ / FTD qtd
// ============================================================

function ChannelTable({ channels }) {
  // Totais pra linha de rodapé
  const tot = channels.reduce((a, c) => ({
    spend: a.spend + (c.spend || 0),
    ftdQty: a.ftdQty + (c.ftdQty || 0),
    ftdAmount: a.ftdAmount + (c.ftdAmount || 0),
    depD0: a.depD0 + (c.depD0 || 0),
  }), { spend: 0, ftdQty: 0, ftdAmount: 0, depD0: 0 });

  // Canais sem mídia (spend null) não têm ROAS/CAC — mostram "—"
  const roas = (c) => (c.spend != null && c.spend > 0 ? c.ftdAmount / c.spend : null);
  const roasD0 = (c) => (c.spend != null && c.spend > 0 && c.depD0 != null ? c.depD0 / c.spend : null);
  const cac = (c) => (c.spend != null && c.ftdQty > 0 ? c.spend / c.ftdQty : null);
  const ticket = (c) => (c.ftdQty > 0 ? c.ftdAmount / c.ftdQty : null);

  const roasCell = (r) => {
    if (r == null) return <td>—</td>;
    return <td className={r >= 1 ? 'ch-roas-pos' : 'ch-roas-neg'}>{fmtMultiple(r)}</td>;
  };

  return (
    <table className="ch-table">
      <thead>
        <tr>
          <th>Canal</th>
          <th>Investimento</th>
          <th>FTD (R$)</th>
          <th>FTD (qtd)</th>
          <th>ROAS FTD</th>
          <th>ROAS D0</th>
          <th>CAC</th>
          <th>Ticket Médio</th>
        </tr>
      </thead>
      <tbody>
        {channels.map((c, i) => (
          <tr key={i}>
            <td className="ch-name">{c.channel}</td>
            <td>{fmtBRL(c.spend)}</td>
            <td>{fmtBRL(c.ftdAmount)}</td>
            <td>{fmtQty(c.ftdQty)}</td>
            {roasCell(roas(c))}
            {roasCell(roasD0(c))}
            <td>{fmtBRL(cac(c))}</td>
            <td>{fmtBRL(ticket(c))}</td>
          </tr>
        ))}
      </tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          <td>{fmtBRL(tot.spend)}</td>
          <td>{fmtBRL(tot.ftdAmount)}</td>
          <td>{fmtQty(tot.ftdQty)}</td>
          {roasCell(tot.spend > 0 ? tot.ftdAmount / tot.spend : null)}
          {roasCell(tot.spend > 0 ? tot.depD0 / tot.spend : null)}
          <td>{fmtBRL(tot.ftdQty > 0 ? tot.spend / tot.ftdQty : null)}</td>
          <td>{fmtBRL(tot.ftdQty > 0 ? tot.ftdAmount / tot.ftdQty : null)}</td>
        </tr>
      </tfoot>
    </table>
  );
}

// ============================================================
// GGR CHANNEL TABLE — GGR, ROAS GGR e FreeSpins por canal
//   ROAS GGR = GGR ÷ Investimento

function GgrChannelTable({ channels }) {
  const tot = channels.reduce((a, c) => ({

  const roasGgr = (c) => (c.spend != null && c.spend > 0 && c.ggr != null ? c.ggr / c.spend : null);
  const roasCell = (r) => {
    if (r == null) return <td>—</td>;

  };
  const ggrCell = (v) => (

// ============================================================
// ROLLOVER MATRIX — rollover (turnover/depósito) por canal × tipo de jogo
// ============================================================

function RolloverMatrix({ data }) {
  // Total ponderado pelo depósito (weight) das linhas exibidas
  const W = data.rows.reduce((a, r) => a + (r.weight || 0), 0);
  const totCol = (j) => (W > 0
    ? data.rows.reduce((a, r) => a + ((r.values[j] || 0) * (r.weight || 0)), 0) / W
    : null);
  const totAll = (W > 0
    ? data.rows.reduce((a, r) => a + ((r.total || 0) * (r.weight || 0)), 0) / W
    : null);

  return (
    <table className="ch-table">
      <thead>
        <tr>
          <th>Canal</th>
          {data.columns.map((c, i) => <th key={i}>{c}</th>)}
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        {data.rows.map((r, i) => (
          <tr key={i}>
            <td className="ch-name">{r.channel}</td>
            {r.values.map((v, j) => <td key={j}>{fmtMultiple(v)}</td>)}
            <td style={{ fontWeight: 700 }}>{fmtMultiple(r.total)}</td>
          </tr>
        ))}
      </tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          {data.columns.map((c, j) => <td key={j}>{fmtMultiple(totCol(j))}</td>)}
          <td>{fmtMultiple(totAll)}</td>
        </tr>
      </tfoot>
    </table>
  );
}

// ============================================================
// RETENTION TABLE — retenção de valor (R$) por canal
//   M0→M1 / M1→M2: média das safras com janela completa
//   M3+: pool de safras antigas, mês ref vs mês anterior
// ============================================================

function RetentionTable({ channels }) {
  // Total exato: soma numeradores/denominadores das linhas exibidas
  const tot = channels.reduce((a, c) => {
    const nd = c.nd || {};
    ['n1','d1','n2','d2','n3','d3'].forEach(k => { a[k] += nd[k] || 0; });
    a.m0 += c.m0Total || 0;
    return a;
  }, { n1: 0, d1: 0, n2: 0, d2: 0, n3: 0, d3: 0, m0: 0 });
  const rate = (n, d) => (d > 0 ? n / d : null);

  return (
    <table className="ch-table">
      <thead>
        <tr>
          <th>Canal</th>
          <th>Dep. M0 (R$)</th>
          <th>M0→M1</th>
          <th>M1→M2</th>
          <th>M3+</th>
        </tr>
      </thead>
      <tbody>
        {channels.map((c, i) => (
          <tr key={i}>
            <td className="ch-name">{c.channel}</td>
            <td>{fmtBRL(c.m0Total)}</td>
            <td>{fmtPct(c.m0m1)}</td>
            <td>{fmtPct(c.m1m2)}</td>
            <td>{fmtPct(c.m3plus)}</td>
          </tr>
        ))}
      </tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          <td>{fmtBRL(tot.m0)}</td>
          <td>{fmtPct(rate(tot.n1, tot.d1))}</td>
          <td>{fmtPct(rate(tot.n2, tot.d2))}</td>
          <td>{fmtPct(rate(tot.n3, tot.d3))}</td>
        </tr>
      </tfoot>
    </table>
  );
}

// ============================================================
// DATE HELPERS — presets + parsing
// ============================================================
function todayISO_() {
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate() - 1)
    .toISOString().slice(0, 10);
}
function firstOfMonthISO_(d = new Date()) {
  return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0, 10);
}
function lastMonthRangeISO_() {
  const t = new Date();
  const start = new Date(t.getFullYear(), t.getMonth() - 1, 1);
  const end = new Date(t.getFullYear(), t.getMonth(), 0);
  return { from: start.toISOString().slice(0, 10), to: end.toISOString().slice(0, 10) };
}
function daysAgoISO_(n) {
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate() - n)
    .toISOString().slice(0, 10);
}
function fmtBR_(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

// ============================================================
// MOCK HERO FILTERING — no live o backend filtra de verdade;
// no mock derivamos os heroes das tabelas mock pro preview reagir igual.
// ============================================================
function sumBy_(list, f) { return (list || []).reduce((a, c) => a + (f(c) || 0), 0); }

function deriveMockM_(M, filter) {
  if (!filter.channel && filter.scope !== 'growth') return M;
  const pick = (list, isPaid) => filter.channel
    ? list.filter(c => c.channel === filter.channel)
    : list.filter(c => isPaid ? isPaid(c) : GROWTH_CHANNELS.indexOf(c.channel) >= 0);

  const ch = pick(MOCK_CHANNELS, c => c.spend != null);
  const gg = pick(MOCK_GGR_CHANNELS, c => c.spend != null);
  const dp = pick(MOCK_DEPM0_CHANNELS, c => c.invest != null);
  const rt = pick(MOCK_RETENTION_CHANNELS, null);
  const rm = pick(MOCK_ROLLOVER_MATRIX.rows, null);

  const ftd = sumBy_(ch, c => c.ftdAmount);
  const spend = sumBy_(ch, c => c.spend);
  const ggr = sumBy_(gg, c => c.ggr);
  const depM0 = sumBy_(dp, c => c.depM0);
  const depM0Growth = sumBy_(dp.filter(c => c.invest != null), c => c.depM0);
  const ggrShare = sumBy_(MOCK_GGR_CHANNELS, c => c.ggr) > 0 ? ggr / sumBy_(MOCK_GGR_CHANNELS, c => c.ggr) : 1;
  const depShare = sumBy_(MOCK_DEPM0_CHANNELS, c => c.depM0) > 0 ? depM0 / sumBy_(MOCK_DEPM0_CHANNELS, c => c.depM0) : 1;

  const W = sumBy_(rt, c => c.m0Total);
  const wavg = (key) => (W > 0 ? sumBy_(rt, c => (c[key] || 0) * (c.m0Total || 0)) / W : null);
  const RW = sumBy_(rm, r => r.weight);
  const rollover = RW > 0 ? sumBy_(rm, r => (r.total || 0) * (r.weight || 0)) / RW : null;

  // set: novo act, escala m1 na mesma proporção (mantém o delta coerente no mock)
  const set = (m, v) => {
    const f = (m.act != null && m.act !== 0 && v != null) ? v / m.act : null;
    return { ...m, act: v, m1: (f != null && m.m1 != null) ? m.m1 * f : m.m1 };
  };
  const scale = (m, f) => set(m, m.act != null ? m.act * f : null);

  return {
    ...M,
    ftdAmount: set(M.ftdAmount, ftd || null),
    roasFtd: set(M.roasFtd, spend > 0 ? ftd / spend : null),
    invest: set(M.invest, spend > 0 ? spend : null),
    ggr: set(M.ggr, ggr || null),
    ggrTrend: scale(M.ggrTrend, ggrShare),
    depTotal: scale(M.depTotal, depShare),
    depM0Total: set(M.depM0Total, depM0 || null),
    depM0Growth: set(M.depM0Growth, depM0Growth || null),
    retM0M1: set(M.retM0M1, wavg('m0m1')),
    retM1M2: set(M.retM1M2, wavg('m1m2')),
    retM3plus: set(M.retM3plus, wavg('m3plus')),
    turnover: scale(M.turnover, ggrShare),
    rollover: set(M.rollover, rollover),
  };
}

const PRESETS = [
  { id: 'mtd', label: 'MTD', range: () => ({ from: firstOfMonthISO_(), to: todayISO_() }) },
  { id: '7d',  label: '7d',  range: () => ({ from: daysAgoISO_(7), to: todayISO_() }) },
  { id: '30d', label: '30d', range: () => ({ from: daysAgoISO_(30), to: todayISO_() }) },
  { id: 'lm',  label: 'Mês passado', range: () => lastMonthRangeISO_() },
];

function App() {
  const [tabId, setTabId] = useState('aquisicao');
  const initialRange = PRESETS[0].range();
  const [pendingRange, setPendingRange] = useState(initialRange);
  const [appliedRange, setAppliedRange] = useState(initialRange);
  const [activePreset, setActivePreset] = useState('mtd');
  // Filtro de canal: channel = canal específico · scope = 'all' (Total Casa) | 'growth' (Canais Growth)
  const [chFilter, setChFilter] = useState({ channel: null, scope: 'all' });
  const [state, setState] = useState({
    loading: !!ENDPOINT_URL,
    error: null,
    meta: MOCK_META,
    M: MOCK_M,
    clusterDep: CLUSTER_DEP,
    clusterGgr: CLUSTER_GGR,
    depComposition: MOCK_DEP_COMPOSITION,
    verticals: VERTICALS,
    channels: MOCK_CHANNELS,
    retentionChannels: MOCK_RETENTION_CHANNELS,
    ggrChannels: MOCK_GGR_CHANNELS,
    depM0Channels: MOCK_DEPM0_CHANNELS,
    rolloverMatrix: MOCK_ROLLOVER_MATRIX,
    isLive: false,
  });

  useEffect(() => {
    if (!ENDPOINT_URL) return;
    setState(prev => ({ ...prev, loading: true, error: null }));
    let url = `${ENDPOINT_URL}?key=${ACCESS_TOKEN}&from=${appliedRange.from}&to=${appliedRange.to}`;
    if (chFilter.channel) url += `&channel=${encodeURIComponent(chFilter.channel)}`;
    else if (chFilter.scope === 'growth') url += `&scope=growth`;
    fetch(url)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(payload => {
        if (payload.error) throw new Error(payload.error);
        setState(prev => ({
          ...prev,
          loading: false,
          error: null,
          meta: payload.meta || prev.meta,
          M: payload.metrics || prev.M,
          clusterDep: payload.clusterDep,
          clusterGgr: payload.clusterGgr,
          depComposition: payload.depComposition,
          verticals: payload.verticals,
          channels: payload.channels,
          retentionChannels: payload.retentionChannels,
          ggrChannels: payload.ggrChannels,
          depM0Channels: payload.depM0Channels,
          rolloverMatrix: payload.rolloverMatrix,
          isLive: true,
        }));
      })
      .catch(err => {
        setState(prev => ({ ...prev, loading: false, error: String(err.message || err) }));
      });
  }, [appliedRange.from, appliedRange.to, chFilter.channel, chFilter.scope]);

  // Filtro client-side (modo mock e redundância no live) das tabelas por canal
  function filterByChannel(list, isPaid) {
    if (!list) return list;
    if (chFilter.channel) return list.filter(c => c.channel === chFilter.channel);
    if (chFilter.scope === 'growth') {
      return list.filter(c => isPaid ? isPaid(c) : GROWTH_CHANNELS.indexOf(c.channel) >= 0);
    }
    return list;
  }

  const fChannels = filterByChannel(state.channels, c => c.spend != null);
  const fGgrChannels = filterByChannel(state.ggrChannels, c => c.spend != null);
  const fDepM0Channels = filterByChannel(state.depM0Channels, c => c.invest != null);
  const fRetentionChannels = filterByChannel(state.retentionChannels, null);
  const fRolloverMatrix = state.rolloverMatrix
    ? { ...state.rolloverMatrix, rows: filterByChannel(state.rolloverMatrix.rows, null) || [] }
    : null;

  // Opções do dropdown: nomes dos canais presentes no dado (sem filtro aplicado)
  const channelOptions = (state.channels || []).map(c => c.channel);

  // Heroes: live = backend já filtrado · mock = deriva das tabelas mock
  const displayM = state.isLive ? state.M : deriveMockM_(state.M, chFilter);

  function applyPreset(presetId) {
    const p = PRESETS.find(x => x.id === presetId);
    if (!p) return;
    const r = p.range();
    setActivePreset(presetId);
    setPendingRange(r);
    setAppliedRange(r);
  }

  function applyManual() {
    setActivePreset(null);
    setAppliedRange(pendingRange);
  }

  const isDirty = pendingRange.from !== appliedRange.from || pendingRange.to !== appliedRange.to;

  const Tab = TABS.find(t => t.id === tabId).component;

  return (
    <React.Fragment>
      <header className="topbar">
        <div className="brand">RevOps Cockpit<span> — Apostou</span></div>
        <div className="controls">
          <span className="meta-chip">
            {fmtBR_(appliedRange.from)} → {fmtBR_(appliedRange.to)}
          </span>
          {state.loading && <span className="meta-chip">Carregando do BQ…</span>}
          {state.error && <span className="mock-chip" title={state.error}>Erro · usando mock</span>}
          {!state.loading && !state.error && (
            <span className={state.isLive ? 'meta-chip' : 'mock-chip'}>
              {state.isLive ? 'Live · BigQuery' : 'Mock · BQ pendente'}
            </span>
          )}
        </div>
      </header>
      <div className="slicer">
        <div className="slicer-group">
          <label>De</label>
          <input
            type="date"
            value={pendingRange.from}
            max={pendingRange.to}
            onChange={e => { setPendingRange(r => ({ ...r, from: e.target.value })); setActivePreset(null); }}
          />
          <span className="slicer-arrow">→</span>
          <label>Até</label>
          <input
            type="date"
            value={pendingRange.to}
            min={pendingRange.from}
            onChange={e => { setPendingRange(r => ({ ...r, to: e.target.value })); setActivePreset(null); }}
          />
        </div>
        <div className="slicer-presets">
          {PRESETS.map(p => (
            <button
              key={p.id}
              className={`preset-btn ${activePreset === p.id ? 'active' : ''}`}
              onClick={() => applyPreset(p.id)}
            >
              {p.label}
            </button>
          ))}
        </div>
        <div className="slicer-divider" />
        <div className="slicer-group">
          <label>Canal</label>
          <select
            value={chFilter.channel || ''}
            onChange={e => setChFilter({ channel: e.target.value || null, scope: 'all' })}
          >
            <option value="">Todos</option>
            {channelOptions.map((c, i) => <option key={i} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="slicer-presets">
          <button
            className={`preset-btn ${!chFilter.channel && chFilter.scope === 'growth' ? 'active' : ''}`}
            onClick={() => setChFilter({ channel: null, scope: 'growth' })}
            title="Só canais de mídia paga (Meta, Google, TikTok, Kwai)"
          >
            Canais Growth
          </button>
          <button
            className={`preset-btn ${!chFilter.channel && chFilter.scope === 'all' ? 'active' : ''}`}
            onClick={() => setChFilter({ channel: null, scope: 'all' })}
            title="Casa toda, sem filtro de canal"
          >
            Total Casa
          </button>
        </div>
        <button className="apply-btn" disabled={!isDirty} onClick={applyManual}>Aplicar</button>
      </div>
      <nav className="tabs">
        {TABS.map(t => (
          <button
            key={t.id}
            className={`tab-btn ${tabId === t.id ? 'active' : ''}`}
            onClick={() => setTabId(t.id)}
          >
            {t.label}
          </button>
        ))}
      </nav>
      <main>
        <Tab
          M={displayM}
          channels={fChannels}
          retentionChannels={fRetentionChannels}
          ggrChannels={fGgrChannels}
          depM0Channels={fDepM0Channels}
          rolloverMatrix={fRolloverMatrix}
          isLive={state.isLive}
        />
        <div className="footer">
          <span className="farol-key"><span className="dot verde" /> ≥ 95% BP</span>
          <span className="farol-key"><span className="dot amarelo" /> 85–94%</span>
          <span className="farol-key"><span className="dot vermelho" /> &lt; 85%</span>
          <div style={{ marginTop: 8 }}>
            {state.isLive
              ? <>Live · gerado em {state.meta.generatedAt ? new Date(state.meta.generatedAt).toLocaleString('pt-BR') : '—'}</>
              : <>Snapshot {state.meta.refDate} · Mock data · Configure <code>ENDPOINT_URL</code> para ir live</>
            }
          </div>
        </div>
      </main>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
